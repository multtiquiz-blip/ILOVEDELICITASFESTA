<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love Delicitas - Salgados e Doces Artesanais</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Estilos básicos do site */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui; background:#fff8f7; color:#1d1b1b; }
    .primary { color:#ae2f34; }
    .header { background:rgba(255,248,247,0.95); padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
    .hero { padding:60px 24px; text-align:center; background:#f9f2f1; }
    .hero h1 { font-size:36px; font-weight:700; }
    .btn { display:inline-block; padding:12px 32px; border-radius:8px; font-weight:600; }
    .btn-primary { background:#ae2f34; color:white; }
    .section { padding:60px 24px; max-width:1200px; margin:0 auto; }
    .grid-cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:24px; }
    .card { background:white; border-radius:12px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
    .card img { width:100%; height:150px; object-fit:cover; border-radius:8px; }
    footer { background:#33302f; color:#f6efee; padding:40px 24px; text-align:center; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <img id="logo-img" src="" alt="Logo" style="height:50px;">
    <nav style="display:flex; gap:20px;">
      <a href="#" class="primary font-bold">Início</a>
      <a href="#cardapio" class="text-gray-600">Cardápio</a>
      <a href="#calculadora" class="text-gray-600">Calculadora</a>
      <a href="#faq" class="text-gray-600">FAQ</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
    <img id="banner-img" src="" alt="Banner" style="width:100%; max-width:800px; border-radius:12px; margin-bottom:24px;">
    <h1 id="hero-titulo">Carregando...</h1>
    <p id="hero-subtitulo" style="font-size:18px; color:#584140; max-width:600px; margin:0 auto 24px;">Carregando...</p>
    <a href="#calculadora" class="btn btn-primary">Calcular Festa</a>
  </section>

  <!-- Calculadora -->
  <section class="section" id="calculadora">
    <h2 class="text-center text-3xl font-bold mb-8">Calculadora</h2>
    <div style="max-width:600px; margin:0 auto; background:white; padding:24px; border-radius:12px;">
      <label>Convidados: <span id="num-convidados">50</span></label>
      <input type="range" min="10" max="500" value="50" id="slider-convidados" style="width:100%;">
      <p style="margin-top:12px;">Salgados: <strong id="qtd-salgados">600</strong> un.</p>
      <p>Doces: <strong id="qtd-doces">250</strong> un.</p>
    </div>
  </section>

  <!-- Cardápio -->
  <section class="section" id="cardapio">
    <h2 class="text-center text-3xl font-bold mb-8">Cardápio</h2>
    <div class="grid-cards" id="grid-cardapio"></div>
  </section>

  <!-- FAQ -->
  <section class="section" id="faq">
    <h2 class="text-center text-3xl font-bold mb-8">FAQ</h2>
    <div id="faq-container" style="max-width:700px; margin:0 auto;"></div>
  </section>

  <!-- Footer -->
  <footer>
    <p id="rodape-texto">Carregando...</p>
    <p id="rodape-copyright" style="font-size:12px; opacity:0.6;"></p>
  </footer>

  <script>
    // CARREGAR DADOS DO localStorage (sem login)
    const DADOS_PADRAO = {
      config: [
        { chave:'logo_url', valor:'https://lh3.googleusercontent.com/aida/ADBb0ugXUlfqE_riiemrY0lMebk7m_HbF7pAOWpdvMCNcI2BwK6RveR6gfTI2jFu6jfjPjSMwtn0dyt7peowpzaAcEH3Nk9WzDnzP4M7fhm3HTJ5dkbioz0QtyJzMUh0NNzyDpMId9lMbQIcSSYEHcuLbf2Ah-GIfB-WC_6YoCjzwspIGCi32KPGu549MNkiZWi5fKxBiY963AMd_EDvtGiOWuwaQOM-XnfjNf7Pg-5rfo7ogV00qHHkSFy8XUfo' },
        { chave:'banner_url', valor:'https://lh3.googleusercontent.com/aida/ADBb0uhRIn7kgpa8myTqSiWgqQ8tV7xYshJQRfSu6QHG9NnxML9H8DIEHiGa-wZabvTTaGvW2KXKo1V9Fz56HBM9_1nhtpzjsGaL57McDPNFzTMyoTN_XXwU2ycSyfLlm8iXLS7DwNPZ4iLWe-WplQc3_BGKLXeP4mz7b3V4SSqWzTK4S2iFdbOFFe_sJFlcfgvDp4Dg8Pgbrem8tH0L2K8L5boZk2ESadA5cZVGxqy9y2p3Jvis-oZnG79vPgY' },
        { chave:'titulo_hero', valor:'A Celebração que o Seu Paladar Merece' },
        { chave:'subtitulo_hero', valor:'Doces e salgados artesanais. Fritura no local, retirada ou frete por aplicativo. BH e região.' },
        { chave:'telefone', valor:'5531999999999' },
        { chave:'whatsapp_link', valor:'https://wa.me/5531999999999' },
        { chave:'rodape_texto', valor:'Gastronomia artesanal para festas em BH. Fritura no local, retirada ou frete por app. Pagamento em até 3x.' },
        { chave:'rodape_copyright', valor:'© 2025 I Love Delicitas. Todos os direitos reservados.' }
      ],
      produtos: [
        { id:1, nome:'Coxinha de Frango', preco:90, categoria:'Fritos', unidade:'Cento (100 un.)', descricao:'Clássica massa de batata com frango desfiado.', imagem:'https://via.placeholder.com/300x200?text=Coxinha' },
        { id:2, nome:'Bolinha de Queijo', preco:90, categoria:'Fritos', unidade:'Cento (100 un.)', descricao:'Massa cremosa recheada com mussarela.', imagem:'https://via.placeholder.com/300x200?text=Bolinha' },
        { id:3, nome:'Brigadeiro', preco:70, categoria:'Doces', unidade:'Cento (100 un.)', descricao:'Brigadeiro gourmet com granulado belga.', imagem:'https://via.placeholder.com/300x200?text=Brigadeiro' }
      ],
      faq: [
        { id:1, pergunta:'Qual o prazo mínimo?', resposta:'Recomendamos 7 dias para encomendas menores e 15 para grandes eventos.', ordem:1 },
        { id:2, pergunta:'Vocês entregam?', resposta:'Cliente retira no local ou contrata entregador por app.', ordem:2 }
      ],
      redes: [
        { plataforma:'instagram', url:'https://instagram.com/ilovedelicitas' },
        { plataforma:'facebook', url:'https://facebook.com/ilovedelicitas' }
      ]
    };

    let dados = {};

    function carregarDados() {
      const salvo = localStorage.getItem('ilovedelicitas_dados');
      if(salvo) {
        try { dados = JSON.parse(salvo); } catch(e) { dados = JSON.parse(JSON.stringify(DADOS_PADRAO)); }
        for(let k in DADOS_PADRAO) if(!dados[k]) dados[k] = JSON.parse(JSON.stringify(DADOS_PADRAO[k]));
      } else dados = JSON.parse(JSON.stringify(DADOS_PADRAO));
    }

    function renderizar() {
      const get = (chave) => {
        const item = dados.config.find(c => c.chave === chave);
        return item ? item.valor : '';
      };

      document.getElementById('logo-img').src = get('logo_url');
      document.getElementById('banner-img').src = get('banner_url');
      document.getElementById('hero-titulo').textContent = get('titulo_hero');
      document.getElementById('hero-subtitulo').textContent = get('subtitulo_hero');
      document.getElementById('rodape-texto').textContent = get('rodape_texto');
      document.getElementById('rodape-copyright').textContent = get('rodape_copyright');

      // Cardápio
      const grid = document.getElementById('grid-cardapio');
      grid.innerHTML = dados.produtos.map(p => `
        <div class="card">
          <img src="${p.imagem || 'https://via.placeholder.com/300x200'}" alt="${p.nome}">
          <h3>${p.nome}</h3>
          <p style="color:#666;font-size:14px;">${p.descricao || ''}</p>
          <p style="font-weight:700;color:#ae2f34;">R$ ${p.preco.toFixed(2)}</p>
        </div>
      `).join('');

      // FAQ
      const faqContainer = document.getElementById('faq-container');
      faqContainer.innerHTML = dados.faq.map(f => `
        <details style="background:white; border-radius:8px; padding:12px; margin-bottom:8px;">
          <summary style="font-weight:600; cursor:pointer;">${f.pergunta}</summary>
          <p style="margin-top:8px; color:#584140;">${f.resposta}</p>
        </details>
      `).join('');

      // Calculadora
      const slider = document.getElementById('slider-convidados');
      const num = document.getElementById('num-convidados');
      const salg = document.getElementById('qtd-salgados');
      const doces = document.getElementById('qtd-doces');
      slider.addEventListener('input', function() {
        num.textContent = this.value;
        const guests = parseInt(this.value);
        salg.textContent = Math.round(guests * 12);
        doces.textContent = Math.round(guests * 5);
      });
    }

    carregarDados();
    renderizar();
  </script>
</body>
</html>
