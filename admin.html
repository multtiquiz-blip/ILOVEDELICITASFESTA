<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - I Love Delicitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>body { background: #f3f4f6; }</style>
</head>
<body class="p-6">
<div class="max-w-7xl mx-auto">
  <div id="loginArea" class="bg-white rounded-2xl shadow-md max-w-md mx-auto mt-20 p-8">
    <h2 class="text-2xl font-bold mb-4">Acesso Admin</h2>
    <input type="text" id="adminUser" placeholder="Usuário" class="w-full border p-2 mb-3 rounded">
    <input type="password" id="adminPass" placeholder="Senha" class="w-full border p-2 mb-4 rounded">
    <button onclick="fazerLogin()" class="bg-red-600 text-white w-full py-2 rounded-full">Entrar</button>
    <p id="loginError" class="text-red-500 text-sm mt-2 hidden">Usuário ou senha inválidos</p>
    <p class="text-xs text-gray-400 mt-4">Use: admin / 123</p>
  </div>

  <div id="adminPanel" class="hidden">
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow">
      <h1 class="text-2xl font-bold">Painel de Controle - I Love Delicitas</h1>
      <button onclick="logout()" class="bg-gray-300 px-4 py-2 rounded">Sair</button>
    </div>
    
    <div class="grid md:grid-cols-2 gap-6">
      <!-- Configurações do site -->
      <div class="bg-white p-4 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">⚙️ Configurações do Site</h2>
        <div id="configForm" class="space-y-3"></div>
        <button onclick="salvarConfiguracoes()" class="bg-green-600 text-white px-4 py-2 rounded mt-3">Salvar configurações</button>
      </div>
      
      <!-- Regras da calculadora -->
      <div class="bg-white p-4 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">📊 Regras da Calculadora</h2>
        <div id="regrasForm" class="space-y-3"></div>
        <button onclick="salvarRegras()" class="bg-green-600 text-white px-4 py-2 rounded mt-3">Salvar regras</button>
      </div>
      
      <!-- Cardápio -->
      <div class="bg-white p-4 rounded-xl shadow md:col-span-2">
        <h2 class="text-xl font-bold mb-4">🍔 Cardápio</h2>
        <button onclick="abrirModalProduto()" class="bg-blue-600 text-white px-3 py-1 rounded mb-3">+ Adicionar produto</button>
        <div id="listaProdutos" class="space-y-2 max-h-96 overflow-y-auto"></div>
      </div>
      
      <!-- FAQ -->
      <div class="bg-white p-4 rounded-xl shadow md:col-span-2">
        <h2 class="text-xl font-bold mb-4">❓ FAQ (Perguntas Frequentes)</h2>
        <button onclick="abrirModalFaq()" class="bg-blue-600 text-white px-3 py-1 rounded mb-3">+ Adicionar pergunta</button>
        <div id="listaFaq" class="space-y-2 max-h-96 overflow-y-auto"></div>
      </div>
      
      <!-- Respostas da Delinha -->
      <div class="bg-white p-4 rounded-xl shadow md:col-span-2">
        <h2 class="text-xl font-bold mb-4">💬 Respostas da Delinha (chat)</h2>
        <div id="respostasChatForm" class="space-y-3"></div>
        <button onclick="salvarRespostasChat()" class="bg-green-600 text-white px-4 py-2 rounded mt-3">Salvar respostas</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL PRODUTO -->
<div id="produtoModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-md">
    <h3 id="modalTitle" class="text-xl font-bold mb-4">Produto</h3>
    <input type="hidden" id="produtoId">
    <input type="text" id="prodNome" placeholder="Nome" class="w-full border p-2 mb-2 rounded">
    <input type="number" id="prodPreco" step="0.01" placeholder="Preço" class="w-full border p-2 mb-2 rounded">
    <select id="prodCategoria" class="w-full border p-2 mb-2 rounded">
      <option value="Fritos">Fritos</option><option value="Assados">Assados</option><option value="Lanches">Lanches</option><option value="Doces">Doces</option>
    </select>
    <input type="text" id="prodUnidade" placeholder="Unidade" class="w-full border p-2 mb-2 rounded">
    <textarea id="prodDescricao" placeholder="Descrição" class="w-full border p-2 mb-2 rounded"></textarea>
    <input type="url" id="prodImagem" placeholder="URL da imagem" class="w-full border p-2 mb-4 rounded">
    <div class="flex justify-end gap-2"><button onclick="fecharModalProduto()" class="bg-gray-300 px-4 py-2 rounded">Cancelar</button><button onclick="salvarProduto()" class="bg-red-600 text-white px-4 py-2 rounded">Salvar</button></div>
  </div>
</div>

<!-- MODAL FAQ -->
<div id="faqModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-md">
    <h3 id="faqModalTitle" class="text-xl font-bold mb-4">FAQ</h3>
    <input type="hidden" id="faqId">
    <input type="text" id="faqPergunta" placeholder="Pergunta" class="w-full border p-2 mb-2 rounded">
    <textarea id="faqResposta" placeholder="Resposta" rows="3" class="w-full border p-2 mb-4 rounded"></textarea>
    <div class="flex justify-end gap-2"><button onclick="fecharModalFaq()" class="bg-gray-300 px-4 py-2 rounded">Cancelar</button><button onclick="salvarFaq()" class="bg-red-600 text-white px-4 py-2 rounded">Salvar</button></div>
  </div>
</div>

<script>
  let supabase;
  let configuracoes = [], regras = [], produtos = [], respostasChat = [], faq = [];

  async function fazerLogin() {
    const user = document.getElementById('adminUser').value.trim();
    const pass = document.getElementById('adminPass').value.trim();
    if (user === 'admin' && pass === '123') {
      document.getElementById('loginArea').style.display = 'none';
      document.getElementById('adminPanel').classList.remove('hidden');
      try {
        if (typeof SUPABASE_CONFIG !== 'undefined') {
          supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
          await carregarDados();
        } else { alert("config.js não encontrado. Conecte o Supabase."); }
      } catch(e) { alert("Erro Supabase: "+e.message); }
    } else { document.getElementById('loginError').classList.remove('hidden'); setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 2000); }
  }

  async function carregarDados() {
    if (!supabase) return;
    try {
      const { data: c } = await supabase.from('configuracoes').select('*');
      const { data: r } = await supabase.from('regras_calculadora').select('*');
      const { data: p } = await supabase.from('cardapio').select('*').order('id');
      const { data: rc } = await supabase.from('respostas_delinha').select('*');
      const { data: f } = await supabase.from('faq').select('*').order('ordem');
      configuracoes = c || []; regras = r || []; produtos = p || []; respostasChat = rc || []; faq = f || [];
      renderizarConfiguracoes(); renderizarRegras(); renderizarProdutos(); renderizarRespostasChat(); renderizarFaq();
    } catch(e) { console.error(e); alert("Erro ao carregar dados: "+e.message); }
  }

  function renderizarConfiguracoes() {
    const container = document.getElementById('configForm');
    const campos = ['titulo_hero','subtitulo_hero','texto_retirada','texto_pagamento','texto_fritura','telefone','whatsapp_link','logo_url','banner_url','rodape_texto','rodape_copyright'];
    container.innerHTML = campos.map(chave => {
      const item = configuracoes.find(c => c.chave === chave);
      return `<div><label class="block font-semibold">${chave}</label><input type="text" id="cfg_${chave}" value="${item?.valor || ''}" class="w-full border p-1 rounded"></div>`;
    }).join('');
  }
  async function salvarConfiguracoes() {
    if (!supabase) { alert("Supabase não conectado"); return; }
    const campos = ['titulo_hero','subtitulo_hero','texto_retirada','texto_pagamento','texto_fritura','telefone','whatsapp_link','logo_url','banner_url','rodape_texto','rodape_copyright'];
    for (let chave of campos) {
      const valor = document.getElementById(`cfg_${chave}`).value;
      await supabase.from('configuracoes').upsert({ chave, valor }, { onConflict: 'chave' });
    }
    alert('Configurações salvas!');
  }

  function renderizarRegras() {
    const container = document.getElementById('regrasForm');
    container.innerHTML = regras.map(r => `<div class="border p-2 rounded"><label class="font-semibold">${r.tipo_evento}</label><div class="flex gap-2 mt-1"><input type="number" id="reg_${r.tipo_evento}_s" value="${r.salgados_por_pessoa}" class="w-1/2 border p-1 rounded" placeholder="Salgados/pessoa"><input type="number" id="reg_${r.tipo_evento}_d" value="${r.doces_por_pessoa}" class="w-1/2 border p-1 rounded" placeholder="Doces/pessoa"></div></div>`).join('');
  }
  async function salvarRegras() {
    if (!supabase) { alert("Supabase não conectado"); return; }
    for (let r of regras) {
      const s = document.getElementById(`reg_${r.tipo_evento}_s`).value;
      const d = document.getElementById(`reg_${r.tipo_evento}_d`).value;
      await supabase.from('regras_calculadora').upsert({ tipo_evento: r.tipo_evento, salgados_por_pessoa: parseInt(s), doces_por_pessoa: parseInt(d) }, { onConflict: 'tipo_evento' });
    }
    alert('Regras salvas!');
  }

  function renderizarProdutos() {
    const container = document.getElementById('listaProdutos');
    container.innerHTML = produtos.map(p => `<div class="flex justify-between items-center border-b py-2"><div><span class="font-bold">${p.nome}</span> - R$ ${p.preco} - ${p.categoria}</div><div><button onclick="editarProduto(${p.id})" class="text-blue-600 mr-2">Editar</button><button onclick="excluirProduto(${p.id})" class="text-red-600">Excluir</button></div></div>`).join('');
  }
  function abrirModalProduto(produto = null) {
    const modal = document.getElementById('produtoModal');
    modal.classList.remove('hidden'); modal.classList.add('flex');
    if (produto) {
      document.getElementById('modalTitle').innerText = 'Editar produto';
      document.getElementById('produtoId').value = produto.id;
      document.getElementById('prodNome').value = produto.nome;
      document.getElementById('prodPreco').value = produto.preco;
      document.getElementById('prodCategoria').value = produto.categoria;
      document.getElementById('prodUnidade').value = produto.unidade || '';
      document.getElementById('prodDescricao').value = produto.descricao || '';
      document.getElementById('prodImagem').value = produto.imagem || '';
    } else {
      document.getElementById('modalTitle').innerText = 'Novo produto';
      document.getElementById('produtoId').value = '';
      document.getElementById('prodNome').value = '';
      document.getElementById('prodPreco').value = '';
      document.getElementById('prodCategoria').value = 'Fritos';
      document.getElementById('prodUnidade').value = '';
      document.getElementById('prodDescricao').value = '';
      document.getElementById('prodImagem').value = '';
    }
  }
  function fecharModalProduto() { const modal = document.getElementById('produtoModal'); modal.classList.add('hidden'); modal.classList.remove('flex'); }
  async function salvarProduto() {
    if (!supabase) { alert("Supabase não conectado"); return; }
    const id = document.getElementById('produtoId').value;
    const produto = { nome: document.getElementById('prodNome').value, preco: parseFloat(document.getElementById('prodPreco').value), categoria: document.getElementById('prodCategoria').value, unidade: document.getElementById('prodUnidade').value, descricao: document.getElementById('prodDescricao').value, imagem: document.getElementById('prodImagem').value };
    if (!produto.nome || isNaN(produto.preco)) { alert('Nome e preço obrigatórios'); return; }
    if (id) await supabase.from('cardapio').update(produto).eq('id', id);
    else await supabase.from('cardapio').insert([produto]);
    fecharModalProduto(); await carregarDados();
  }
  async function editarProduto(id) { const produto = produtos.find(p => p.id === id); if (produto) abrirModalProduto(produto); }
  async function excluirProduto(id) { if (confirm('Excluir?')) { await supabase.from('cardapio').delete().eq('id', id); await carregarDados(); } }

  function renderizarRespostasChat() {
    const container = document.getElementById('respostasChatForm');
    container.innerHTML = respostasChat.map(r => `<div class="border p-2 rounded"><label class="font-semibold">Palavra-chave: ${r.palavra_chave}</label><textarea id="resp_${r.palavra_chave}" class="w-full border p-1 rounded mt-1" rows="2">${r.resposta}</textarea></div>`).join('');
  }
  async function salvarRespostasChat() {
    if (!supabase) { alert("Supabase não conectado"); return; }
    for (let r of respostasChat) {
      const novaResp = document.getElementById(`resp_${r.palavra_chave}`).value;
      await supabase.from('respostas_delinha').upsert({ palavra_chave: r.palavra_chave, resposta: novaResp }, { onConflict: 'palavra_chave' });
    }
    alert('Respostas salvas!');
  }

  function renderizarFaq() {
    const container = document.getElementById('listaFaq');
    container.innerHTML = faq.map(item => `<div class="flex justify-between items-center border-b py-2"><div><span class="font-bold">${item.pergunta}</span><br><span class="text-sm text-gray-500">${item.resposta.substring(0, 80)}...</span></div><div><button onclick="editarFaq(${item.id})" class="text-blue-600 mr-2">Editar</button><button onclick="excluirFaq(${item.id})" class="text-red-600">Excluir</button></div></div>`).join('');
  }
  function abrirModalFaq(faqItem = null) {
    const modal = document.getElementById('faqModal');
    modal.classList.remove('hidden'); modal.classList.add('flex');
    if (faqItem) {
      document.getElementById('faqModalTitle').innerText = 'Editar FAQ';
      document.getElementById('faqId').value = faqItem.id;
      document.getElementById('faqPergunta').value = faqItem.pergunta;
      document.getElementById('faqResposta').value = faqItem.resposta;
    } else {
      document.getElementById('faqModalTitle').innerText = 'Novo FAQ';
      document.getElementById('faqId').value = '';
      document.getElementById('faqPergunta').value = '';
      document.getElementById('faqResposta').value = '';
    }
  }
  function fecharModalFaq() { const modal = document.getElementById('faqModal'); modal.classList.add('hidden'); modal.classList.remove('flex'); }
  async function salvarFaq() {
    if (!supabase) { alert("Supabase não conectado"); return; }
    const id = document.getElementById('faqId').value;
    const pergunta = document.getElementById('faqPergunta').value;
    const resposta = document.getElementById('faqResposta').value;
    if (!pergunta || !resposta) { alert('Pergunta e resposta são obrigatórias'); return; }
    if (id) await supabase.from('faq').update({ pergunta, resposta }).eq('id', id);
    else await supabase.from('faq').insert([{ pergunta, resposta, ordem: faq.length + 1 }]);
    fecharModalFaq(); await carregarDados();
  }
  async function editarFaq(id) { const item = faq.find(f => f.id === id); if (item) abrirModalFaq(item); }
  async function excluirFaq(id) { if (confirm('Excluir este FAQ?')) { await supabase.from('faq').delete().eq('id', id); await carregarDados(); } }

  function logout() { document.getElementById('loginArea').style.display = 'block'; document.getElementById('adminPanel').classList.add('hidden'); }
</script>
</body>
</html>
