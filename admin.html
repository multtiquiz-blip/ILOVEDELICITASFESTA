<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel iLove Delicitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>body { background: #f3f4f6; }</style>
</head>
<body class="p-4 md:p-8 font-sans">

<div class="max-w-6xl mx-auto">
  <!-- TELA DE LOGIN -->
  <div id="loginScreen" class="bg-white rounded-2xl shadow-xl max-w-md mx-auto mt-20 p-8">
    <h2 class="text-2xl font-bold text-center mb-6">Acesso Admin</h2>
    <input type="email" id="loginEmail" placeholder="Email" class="w-full border rounded-lg p-3 mb-3">
    <input type="password" id="loginPassword" placeholder="Senha" class="w-full border rounded-lg p-3 mb-4">
    <button onclick="fazerLogin()" class="w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700">Entrar</button>
    <p id="loginError" class="text-red-500 text-sm text-center mt-3 hidden">Email ou senha incorretos</p>
    <p class="text-xs text-gray-400 text-center mt-4">Use: admin@ilovedelicitas.com / delinha123</p>
  </div>

  <!-- PAINEL -->
  <div id="adminPanel" class="hidden">
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow">
      <h1 class="text-2xl font-bold text-gray-800">Gerenciar Cardápio</h1>
      <button onclick="logout()" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded-lg">Sair</button>
    </div>
    <div class="mb-6">
      <button onclick="abrirModal()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg font-semibold">+ Adicionar Item</button>
    </div>
    <div id="listaItems" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>
</div>

<!-- MODAL -->
<div id="itemModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
  <div class="bg-white rounded-2xl max-w-lg w-full p-6">
    <h3 id="modalTitle" class="text-xl font-bold mb-4">Novo Item</h3>
    <input type="hidden" id="itemId">
    <input type="text" id="nome" placeholder="Nome do produto" class="w-full border rounded-lg p-2 mb-3">
    <input type="number" id="preco" step="0.01" placeholder="Preço (R$)" class="w-full border rounded-lg p-2 mb-3">
    <select id="categoria" class="w-full border rounded-lg p-2 mb-3">
      <option value="Fritos">Fritos</option><option value="Assados">Assados</option><option value="Lanches">Lanches</option><option value="Doces">Doces</option>
    </select>
    <input type="text" id="unidade" placeholder="Unidade (ex: Cento, Unidade)" class="w-full border rounded-lg p-2 mb-3">
    <textarea id="descricao" rows="2" placeholder="Descrição curta" class="w-full border rounded-lg p-2 mb-3"></textarea>
    <input type="url" id="imagem" placeholder="URL da imagem (ex: https://...)" class="w-full border rounded-lg p-2 mb-4">
    <div class="flex justify-end gap-2">
      <button onclick="fecharModal()" class="bg-gray-300 px-4 py-2 rounded-lg">Cancelar</button>
      <button onclick="salvarItem()" class="bg-red-600 text-white px-4 py-2 rounded-lg">Salvar</button>
    </div>
  </div>
</div>

<script>
  let supabase = null;
  async function fazerLogin() {
    const email = document.getElementById('loginEmail').value;
    const senha = document.getElementById('loginPassword').value;
    if (email === 'admin@ilovedelicitas.com' && senha === 'delinha123') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').classList.remove('hidden');
      supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
      carregarItens();
    } else {
      document.getElementById('loginError').classList.remove('hidden');
      setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 3000);
    }
  }
  async function carregarItens() {
    const { data, error } = await supabase.from('cardapio').select('*').order('id');
    if (error) { alert('Erro ao carregar itens'); return; }
    const container = document.getElementById('listaItems');
    if (data.length === 0) { container.innerHTML = '<div class="col-span-full text-center p-8 bg-white rounded-lg shadow">Nenhum item cadastrado. Clique em "Adicionar Item" para começar.</div>'; return; }
    container.innerHTML = data.map(item => `
      <div class="bg-white rounded-lg shadow p-4 flex justify-between items-center">
        <div><h3 class="font-bold text-lg">${escapeHtml(item.name)}</h3><p class="text-sm text-gray-600">${escapeHtml(item.cat)} - R$ ${Number(item.price).toFixed(2)}</p><p class="text-xs text-gray-400">${escapeHtml(item.unit)}</p></div>
        <div class="flex gap-2"><button onclick="editarItem(${item.id})" class="text-blue-600">✏️ Editar</button><button onclick="excluirItem(${item.id})" class="text-red-600">🗑️ Excluir</button></div>
      </div>
    `).join('');
  }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'); }); }
  function abrirModal(item = null) {
    const modal = document.getElementById('itemModal');
    modal.classList.remove('hidden'); modal.classList.add('flex');
    if (item) {
      document.getElementById('modalTitle').innerText = 'Editar Item';
      document.getElementById('itemId').value = item.id;
      document.getElementById('nome').value = item.name;
      document.getElementById('preco').value = item.price;
      document.getElementById('categoria').value = item.cat;
      document.getElementById('unidade').value = item.unit;
      document.getElementById('descricao').value = item.description || '';
      document.getElementById('imagem').value = item.img || '';
    } else {
      document.getElementById('modalTitle').innerText = 'Adicionar Item';
      document.getElementById('itemId').value = '';
      document.getElementById('nome').value = '';
      document.getElementById('preco').value = '';
      document.getElementById('categoria').value = 'Fritos';
      document.getElementById('unidade').value = '';
      document.getElementById('descricao').value = '';
      document.getElementById('imagem').value = '';
    }
  }
  function fecharModal() { const modal = document.getElementById('itemModal'); modal.classList.add('hidden'); modal.classList.remove('flex'); }
  async function salvarItem() {
    const id = document.getElementById('itemId').value;
    const item = {
      name: document.getElementById('nome').value,
      price: parseFloat(document.getElementById('preco').value),
      cat: document.getElementById('categoria').value,
      unit: document.getElementById('unidade').value,
      description: document.getElementById('descricao').value,
      img: document.getElementById('imagem').value
    };
    if (isNaN(item.price) || !item.name) { alert('Preencha nome e preço corretamente'); return; }
    let error;
    if (id) { const { error: err } = await supabase.from('cardapio').update(item).eq('id', id); error = err; }
    else { const { error: err } = await supabase.from('cardapio').insert([item]); error = err; }
    if (error) { alert('Erro ao salvar: ' + error.message); return; }
    fecharModal(); carregarItens();
  }
  async function editarItem(id) { const { data, error } = await supabase.from('cardapio').select('*').eq('id', id).single(); if (!error) abrirModal(data); else alert('Erro ao buscar item'); }
  async function excluirItem(id) { if (!confirm('Excluir permanentemente?')) return; await supabase.from('cardapio').delete().eq('id', id); carregarItens(); }
  function logout() { document.getElementById('loginScreen').style.display = 'block'; document.getElementById('adminPanel').classList.add('hidden'); document.getElementById('loginEmail').value = ''; document.getElementById('loginPassword').value = ''; }
</script>
</body>
</html>
