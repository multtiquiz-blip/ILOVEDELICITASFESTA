<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - I Love Delicitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="bg-gray-100 p-6">

<!-- TELA DE LOGIN SIMPLES -->
<div id="loginScreen" class="max-w-md mx-auto bg-white rounded-xl shadow-md p-8 mt-20">
  <h2 class="text-2xl font-bold mb-4">Login Admin</h2>
  <input type="text" id="user" placeholder="Usuário" class="w-full border p-2 mb-3 rounded">
  <input type="password" id="pass" placeholder="Senha" class="w-full border p-2 mb-4 rounded">
  <button onclick="login()" class="bg-red-600 text-white w-full py-2 rounded-full">Entrar</button>
  <p id="loginError" class="text-red-500 text-sm mt-2 hidden">Usuário ou senha inválidos</p>
  <p class="text-xs text-gray-400 mt-4">Use: admin / 123</p>
</div>

<!-- PAINEL (aparece após login) -->
<div id="adminPanel" style="display:none;" class="max-w-7xl mx-auto">
  <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Painel I Love Delicitas</h1>
    <button onclick="logout()" class="bg-gray-300 px-4 py-2 rounded">Sair</button>
  </div>

  <div class="grid md:grid-cols-2 gap-6">
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">⚙️ Configurações</h2>
      <div id="configList" class="space-y-3"></div>
      <button onclick="salvarConfiguracoes()" class="bg-green-600 text-white px-4 py-2 rounded mt-3">Salvar</button>
    </div>
    <div class="bg-white p-4 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">📊 Regras da Calculadora</h2>
      <div id="regrasList" class="space-y-3"></div>
      <button onclick="salvarRegras()" class="bg-green-600 text-white px-4 py-2 rounded mt-3">Salvar</button>
    </div>
    <div class="bg-white p-4 rounded-xl shadow md:col-span-2">
      <h2 class="text-xl font-bold mb-4">🍔 Cardápio</h2>
      <button onclick="novoProduto()" class="bg-blue-600 text-white px-3 py-1 rounded mb-3">+ Adicionar</button>
      <div id="produtosList" class="space-y-2 max-h-96 overflow-y-auto"></div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow md:col-span-2">
      <h2 class="text-xl font-bold mb-4">❓ FAQ</h2>
      <button onclick="novoFaq()" class="bg-blue-600 text-white px-3 py-1 rounded mb-3">+ Adicionar</button>
      <div id="faqList" class="space-y-2 max-h-96 overflow-y-auto"></div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow md:col-span-2">
      <h2 class="text-xl font-bold mb-4">💬 Respostas da Delinha</h2>
      <div id="respostasList" class="space-y-3"></div>
      <button onclick="salvarRespostas()" class="bg-green-600 text-white px-4 py-2 rounded mt-3">Salvar</button>
    </div>
  </div>
</div>

<script>
  let supabase;
  let dados = { config: [], regras: [], produtos: [], faq: [], respostas: [] };

  async function login() {
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if (user !== 'admin' || pass !== '123') {
      document.getElementById('loginError').classList.remove('hidden');
      setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 2000);
      return;
    }
    // Login OK
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    
    // Inicializa Supabase
    if (typeof SUPABASE_CONFIG === 'undefined') {
      alert("ERRO: config.js não carregou. O painel não vai funcionar. Verifique se o arquivo config.js existe no servidor.");
      return;
    }
    supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
    await carregarTodosDados();
  }

  async function carregarTodosDados() {
    try {
      const { data: c } = await supabase.from('configuracoes').select('*');
      const { data: r } = await supabase.from('regras_calculadora').select('*');
      const { data: p } = await supabase.from('cardapio').select('*').order('id');
      const { data: f } = await supabase.from('faq').select('*').order('ordem');
      const { data: rs } = await supabase.from('respostas_delinha').select('*');
      dados.config = c || []; dados.regras = r || []; dados.produtos = p || []; dados.faq = f || []; dados.respostas = rs || [];
      renderizarConfiguracoes(); renderizarRegras(); renderizarProdutos(); renderizarFaq(); renderizarRespostas();
    } catch(e) { alert("Erro ao carregar dados: "+e.message); }
  }

  function renderizarConfiguracoes() {
    const container = document.getElementById('configList');
    const chaves = ['titulo_hero','subtitulo_hero','texto_retirada','texto_pagamento','texto_fritura','telefone','whatsapp_link','logo_url','banner_url','rodape_texto','rodape_copyright'];
    container.innerHTML = chaves.map(k => {
      const item = dados.config.find(c => c.chave === k);
      return `<div><label class="block font-semibold">${k}</label><input type="text" id="cfg_${k}" value="${item?.valor || ''}" class="w-full border p-1 rounded"></div>`;
    }).join('');
  }

  async function salvarConfiguracoes() {
    const chaves = ['titulo_hero','subtitulo_hero','texto_retirada','texto_pagamento','texto_fritura','telefone','whatsapp_link','logo_url','banner_url','rodape_texto','rodape_copyright'];
    for (let k of chaves) {
      const val = document.getElementById(`cfg_${k}`).value;
      await supabase.from('configuracoes').upsert({ chave: k, valor: val }, { onConflict: 'chave' });
    }
    alert("Configurações salvas!");
  }

  function renderizarRegras() {
    const container = document.getElementById('regrasList');
    container.innerHTML = dados.regras.map(r => `
      <div class="border p-2 rounded">
        <label class="font-semibold">${r.tipo_evento}</label>
        <div class="flex gap-2 mt-1">
          <input type="number" id="reg_${r.tipo_evento}_s" value="${r.salgados_por_pessoa}" class="w-1/2 border p-1 rounded" placeholder="Salgados/pessoa">
          <input type="number" id="reg_${r.tipo_evento}_d" value="${r.doces_por_pessoa}" class="w-1/2 border p-1 rounded" placeholder="Doces/pessoa">
        </div>
      </div>
    `).join('');
  }

  async function salvarRegras() {
    for (let r of dados.regras) {
      const s = document.getElementById(`reg_${r.tipo_evento}_s`).value;
      const d = document.getElementById(`reg_${r.tipo_evento}_d`).value;
      await supabase.from('regras_calculadora').upsert({ tipo_evento: r.tipo_evento, salgados_por_pessoa: parseInt(s), doces_por_pessoa: parseInt(d) }, { onConflict: 'tipo_evento' });
    }
    alert("Regras salvas!");
  }

  function renderizarProdutos() {
    const container = document.getElementById('produtosList');
    container.innerHTML = dados.produtos.map(p => `
      <div class="flex justify-between items-center border-b py-2">
        <div><strong>${p.nome}</strong> - R$ ${p.preco} - ${p.categoria}</div>
        <div><button onclick="editarProduto(${p.id})" class="text-blue-600 mr-2">Editar</button><button onclick="excluirProduto(${p.id})" class="text-red-600">Excluir</button></div>
      </div>
    `).join('');
  }

  function novoProduto() {
    const nome = prompt("Nome do produto");
    if (!nome) return;
    const preco = parseFloat(prompt("Preço"));
    if (isNaN(preco)) return;
    const categoria = prompt("Categoria (Fritos/Assados/Lanches/Doces)", "Fritos");
    const unidade = prompt("Unidade (ex: Cento)", "Cento");
    const descricao = prompt("Descrição curta");
    const imagem = prompt("URL da imagem", "https://via.placeholder.com/300x200");
    supabase.from('cardapio').insert([{ nome, preco, categoria, unidade, descricao, imagem }]).then(() => carregarTodosDados());
  }

  async function editarProduto(id) {
    const p = dados.produtos.find(x => x.id == id);
    if (!p) return;
    const novoNome = prompt("Nome", p.nome);
    const novoPreco = parseFloat(prompt("Preço", p.preco));
    const novaCat = prompt("Categoria", p.categoria);
    const novaUnidade = prompt("Unidade", p.unidade);
    const novaDesc = prompt("Descrição", p.descricao);
    const novaImg = prompt("URL da imagem", p.imagem);
    if (novoNome) p.nome = novoNome;
    if (!isNaN(novoPreco)) p.preco = novoPreco;
    if (novaCat) p.categoria = novaCat;
    if (novaUnidade) p.unidade = novaUnidade;
    if (novaDesc) p.descricao = novaDesc;
    if (novaImg) p.imagem = novaImg;
    await supabase.from('cardapio').update(p).eq('id', id);
    carregarTodosDados();
  }

  async function excluirProduto(id) {
    if (confirm("Excluir permanentemente?")) {
      await supabase.from('cardapio').delete().eq('id', id);
      carregarTodosDados();
    }
  }

  function renderizarFaq() {
    const container = document.getElementById('faqList');
    container.innerHTML = dados.faq.map(f => `
      <div class="flex justify-between items-center border-b py-2">
        <div><strong>${f.pergunta}</strong><br><span class="text-sm">${f.resposta.substring(0, 60)}...</span></div>
        <div><button onclick="editarFaq(${f.id})" class="text-blue-600 mr-2">Editar</button><button onclick="excluirFaq(${f.id})" class="text-red-600">Excluir</button></div>
      </div>
    `).join('');
  }

  function novoFaq() {
    const pergunta = prompt("Pergunta");
    if (!pergunta) return;
    const resposta = prompt("Resposta");
    if (!resposta) return;
    supabase.from('faq').insert([{ pergunta, resposta, ordem: dados.faq.length + 1 }]).then(() => carregarTodosDados());
  }

  async function editarFaq(id) {
    const f = dados.faq.find(x => x.id == id);
    if (!f) return;
    const novaPerg = prompt("Pergunta", f.pergunta);
    const novaResp = prompt("Resposta", f.resposta);
    if (novaPerg) f.pergunta = novaPerg;
    if (novaResp) f.resposta = novaResp;
    await supabase.from('faq').update(f).eq('id', id);
    carregarTodosDados();
  }

  async function excluirFaq(id) {
    if (confirm("Excluir FAQ?")) {
      await supabase.from('faq').delete().eq('id', id);
      carregarTodosDados();
    }
  }

  function renderizarRespostas() {
    const container = document.getElementById('respostasList');
    container.innerHTML = dados.respostas.map(r => `
      <div class="border p-2 rounded">
        <label class="font-semibold">Palavra-chave: ${r.palavra_chave}</label>
        <textarea id="resp_${r.palavra_chave}" class="w-full border p-1 rounded mt-1" rows="2">${r.resposta}</textarea>
      </div>
    `).join('');
  }

  async function salvarRespostas() {
    for (let r of dados.respostas) {
      const novoTexto = document.getElementById(`resp_${r.palavra_chave}`).value;
      await supabase.from('respostas_delinha').upsert({ palavra_chave: r.palavra_chave, resposta: novoTexto }, { onConflict: 'palavra_chave' });
    }
    alert("Respostas salvas!");
  }

  function logout() {
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
  }
</script>
</body>
</html>
