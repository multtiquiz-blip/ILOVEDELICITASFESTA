<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel iLove Delicitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-6xl mx-auto">
  <!-- LOGIN -->
  <div id="loginArea" class="bg-white rounded-2xl shadow-md max-w-md mx-auto mt-20 p-8">
    <h2 class="text-2xl font-bold mb-4">Acesso admin</h2>
    <input type="email" id="adminEmail" placeholder="Email" class="w-full border p-2 mb-3 rounded">
    <input type="password" id="adminPass" placeholder="Senha" class="w-full border p-2 mb-4 rounded">
    <button onclick="fazerLogin()" class="bg-red-600 text-white w-full py-2 rounded-full">Entrar</button>
    <p id="loginError" class="text-red-500 text-sm mt-2 hidden">Email ou senha inválidos</p>
    <p class="text-xs text-gray-400 mt-4">Use: admin@ilovedelicitas.com / delinha123</p>
  </div>

  <!-- PAINEL -->
  <div id="adminPanel" class="hidden">
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow">
      <h1 class="text-2xl font-bold">Gerenciar Cardápio</h1>
      <button onclick="logout()" class="bg-gray-300 px-4 py-2 rounded-lg">Sair</button>
    </div>
    <button onclick="abrirModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg mb-4">+ Adicionar item</button>
    <div id="listaItens" class="grid gap-4"></div>
  </div>

  <!-- MODAL -->
  <div id="itemModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md">
      <h3 id="modalTitle" class="text-xl font-bold mb-4">Novo item</h3>
      <input type="hidden" id="itemId">
      <input type="text" id="nome" placeholder="Nome" class="w-full border p-2 mb-3 rounded">
      <input type="number" id="preco" step="0.01" placeholder="Preço" class="w-full border p-2 mb-3 rounded">
      <select id="categoria" class="w-full border p-2 mb-3 rounded">
        <option value="Fritos">Fritos</option><option value="Assados">Assados</option><option value="Lanches">Lanches</option><option value="Doces">Doces</option>
      </select>
      <input type="text" id="unidade" placeholder="Unidade (ex: Cento)" class="w-full border p-2 mb-3 rounded">
      <textarea id="descricao" placeholder="Descrição" class="w-full border p-2 mb-3 rounded"></textarea>
      <input type="url" id="imagem" placeholder="URL da imagem" class="w-full border p-2 mb-4 rounded">
      <div class="flex justify-end gap-2"><button onclick="fecharModal()" class="bg-gray-300 px-4 py-2 rounded">Cancelar</button><button onclick="salvarItem()" class="bg-red-600 text-white px-4 py-2 rounded">Salvar</button></div>
    </div>
  </div>
</div>

<script>
  let supabase;
  async function fazerLogin() {
    const email = document.getElementById('adminEmail').value;
    const pass = document.getElementById('adminPass').value;
    if (email === 'admin@ilovedelicitas.com' && pass === 'delinha123') {
      document.getElementById('loginArea').style.display = 'none';
      document.getElementById('adminPanel').classList.remove('hidden');
      supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
      carregarItens();
    } else { document.getElementById('loginError').classList.remove('hidden'); setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 3000); }
  }
  async function carregarItens() {
    const { data, error } = await supabase.from('cardapio').select('*').order('id');
    if (error) { alert('Erro ao carregar'); return; }
    const container = document.getElementById('listaItens');
    if (data.length === 0) { container.innerHTML = '<div class="bg-white p-8 text-center rounded-xl">Nenhum item. Clique em + Adicionar.</div>'; return; }
    container.innerHTML = data.map(item => `<div class="bg-white p-4 rounded-xl shadow flex justify-between items-center"><div><h3 class="font-bold">${item.name}</h3><p class="text-sm text-gray-600">${item.cat} - R$ ${item.price.toFixed(2)} - ${item.unit}</p></div><div><button onclick="editarItem(${item.id})" class="text-blue-600 mr-2">Editar</button><button onclick="excluirItem(${item.id})" class="text-red-600">Excluir</button></div></div>`).join('');
  }
  function abrirModal(item = null) { const modal = document.getElementById('itemModal'); modal.classList.remove('hidden'); modal.classList.add('flex'); if (item) { document.getElementById('modalTitle').innerText = 'Editar Item'; document.getElementById('itemId').value = item.id; document.getElementById('nome').value = item.name; document.getElementById('preco').value = item.price; document.getElementById('categoria').value = item.cat; document.getElementById('unidade').value = item.unit; document.getElementById('descricao').value = item.description || ''; document.getElementById('imagem').value = item.img || ''; } else { document.getElementById('modalTitle').innerText = 'Adicionar Item'; document.getElementById('itemId').value = ''; document.getElementById('nome').value = ''; document.getElementById('preco').value = ''; document.getElementById('categoria').value = 'Fritos'; document.getElementById('unidade').value = ''; document.getElementById('descricao').value = ''; document.getElementById('imagem').value = ''; } }
  function fecharModal() { const modal = document.getElementById('itemModal'); modal.classList.add('hidden'); modal.classList.remove('flex'); }
  async function salvarItem() { const id = document.getElementById('itemId').value; const item = { name: document.getElementById('nome').value, price: parseFloat(document.getElementById('preco').value), cat: document.getElementById('categoria').value, unit: document.getElementById('unidade').value, description: document.getElementById('descricao').value, img: document.getElementById('imagem').value }; if (!item.name || isNaN(item.price)) { alert('Nome e preço são obrigatórios'); return; } let error; if (id) { const { error: err } = await supabase.from('cardapio').update(item).eq('id', id); error = err; } else { const { error: err } = await supabase.from('cardapio').insert([item]); error = err; } if (error) { alert('Erro ao salvar'); return; } fecharModal(); carregarItens(); }
  async function editarItem(id) { const { data } = await supabase.from('cardapio').select('*').eq('id', id).single(); if (data) abrirModal(data); else alert('Item não encontrado'); }
  async function excluirItem(id) { if (confirm('Excluir permanentemente?')) { await supabase.from('cardapio').delete().eq('id', id); carregarItens(); } }
  function logout() { document.getElementById('loginArea').style.display = 'block'; document.getElementById('adminPanel').classList.add('hidden'); document.getElementById('adminEmail').value = ''; document.getElementById('adminPass').value = ''; }
</script>
</body>
</html>
