<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel I Love Delicitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { background: #f1f5f9; font-family: system-ui, sans-serif; }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
    .tab-active { background: linear-gradient(135deg, #ae2f34 0%, #8b2327 100%) !important; color: white !important; }
    .tab-inactive { background-color: #e2e8f0 !important; color: #1e293b !important; }
    .btn-success { background: #10b981; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 500; }
    .btn-outline { border: 1px solid #ae2f34; color: #ae2f34; background: white; border-radius: 0.5rem; padding: 0.25rem 0.75rem; font-size: 0.875rem; }
    .btn-outline:hover { background: #ae2f34; color: white; }
    input, textarea, select { border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.5rem; width: 100%; }
    label { font-weight: 600; font-size: 0.875rem; display: block; margin-bottom: 0.25rem; }
  </style>
</head>
<body class="p-4 md:p-8">

<div id="app" class="max-w-7xl mx-auto">
  <div class="bg-white rounded-xl shadow-md p-5 flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">I Love Delicitas - Painel</h1>
    <div id="status" class="text-sm bg-green-100 text-green-800 px-3 py-1 rounded-full">✅ Conectado</div>
  </div>

  <div class="flex flex-wrap gap-2 mb-6 border-b pb-2">
    <button onclick="mostrarAba('config')" id="btnConfig" class="tab-active px-5 py-2.5 rounded-lg font-semibold">⚙️ Configurações</button>
    <button onclick="mostrarAba('regras')" id="btnRegras" class="tab-inactive px-5 py-2.5 rounded-lg font-semibold">📊 Calculadora</button>
    <button onclick="mostrarAba('cardapio')" id="btnCardapio" class="tab-inactive px-5 py-2.5 rounded-lg font-semibold">🍔 Cardápio</button>
    <button onclick="mostrarAba('faq')" id="btnFaq" class="tab-inactive px-5 py-2.5 rounded-lg font-semibold">❓ FAQ</button>
    <button onclick="mostrarAba('respostas')" id="btnRespostas" class="tab-inactive px-5 py-2.5 rounded-lg font-semibold">💬 Chat</button>
    <button onclick="mostrarAba('redes')" id="btnRedes" class="tab-inactive px-5 py-2.5 rounded-lg font-semibold">🔗 Redes</button>
    <button onclick="mostrarAba('horario')" id="btnHorario" class="tab-inactive px-5 py-2.5 rounded-lg font-semibold">⏰ Horário</button>
  </div>

  <div id="abaConfig" class="card"><h2 class="text-xl font-bold mb-4">Configurações Gerais</h2><div id="configList" class="grid md:grid-cols-2 gap-4"></div><button onclick="salvarConfiguracoes()" class="btn-success mt-4">💾 Salvar Configurações</button></div>
  <div id="abaRegras" class="card hidden"><h2 class="text-xl font-bold mb-4">Regras da Calculadora</h2><div id="regrasList"></div><button onclick="salvarRegras()" class="btn-success mt-4">💾 Salvar Regras</button></div>
  <div id="abaCardapio" class="card hidden"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">Cardápio</h2><button onclick="novoProduto()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">+ Adicionar</button></div><div id="produtosList"></div></div>
  <div id="abaFaq" class="card hidden"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">FAQ</h2><button onclick="novoFaq()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">+ Adicionar</button></div><div id="faqList"></div></div>
  <div id="abaRespostas" class="card hidden"><h2 class="text-xl font-bold mb-4">Respostas da Delinha</h2><div id="respostasList"></div><button onclick="salvarRespostas()" class="btn-success mt-4">💾 Salvar Respostas</button></div>
  <div id="abaRedes" class="card hidden"><h2 class="text-xl font-bold mb-4">Redes Sociais</h2><div id="redesList" class="grid md:grid-cols-2 gap-4"></div><button onclick="salvarRedes()" class="btn-success mt-4">💾 Salvar Redes</button></div>
  <div id="abaHorario" class="card hidden"><h2 class="text-xl font-bold mb-4">Horário de Funcionamento</h2><div id="horarioList" class="grid md:grid-cols-2 gap-4"></div><button onclick="salvarHorario()" class="btn-success mt-4">💾 Salvar Horário</button></div>
</div>

<script>
  const SUPABASE_URL = 'https://sikiufknmldvkcxcktsn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpa2l1ZmtubWxkdmtjeGNrdHNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjYzMzgsImV4cCI6MjA5Njg0MjMzOH0.WKh9GdL3yJxnQqGUhLIeJNOm-7NRhgaMXW8vlkmEb0I';
  let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let dados = { config: [], regras: [], produtos: [], faq: [], respostas: [], redes: [], horario: [] };

  async function carregarTudo() {
    try {
      const [c, r, p, f, rs, red, hor] = await Promise.all([
        supabase.from('configuracoes').select('*'),
        supabase.from('regras_calculadora').select('*'),
        supabase.from('cardapio').select('*').order('id'),
        supabase.from('faq').select('*').order('ordem'),
        supabase.from('respostas_delinha').select('*'),
        supabase.from('redes_sociais').select('*'),
        supabase.from('horario_funcionamento').select('*').order('id')
      ]);
      dados.config = c.data || []; dados.regras = r.data || []; dados.produtos = p.data || []; dados.faq = f.data || [];
      dados.respostas = rs.data || []; dados.redes = red.data || []; dados.horario = hor.data || [];
      renderizarConfiguracoes(); renderizarRegras(); renderizarProdutos(); renderizarFaq(); renderizarRespostas(); renderizarRedes(); renderizarHorario();
      document.getElementById('status').innerHTML = '✅ Conectado - Dados carregados';
    } catch(e) { alert('Erro ao carregar: ' + e.message); document.getElementById('status').innerHTML = '❌ Erro: ' + e.message; }
  }

  function renderizarConfiguracoes() {
    const campos = ['logo_url','banner_url','titulo_hero','subtitulo_hero','texto_retirada','texto_pagamento','texto_fritura','telefone','whatsapp_link','rodape_texto','rodape_copyright','cep_entrega','mensagem_promocional'];
    const container = document.getElementById('configList');
    container.innerHTML = campos.map(chave => {
      const item = dados.config.find(c => c.chave === chave);
      return `<div><label>${chave}</label><input type="text" id="cfg_${chave}" value="${item?.valor || ''}" class="w-full"></div>`;
    }).join('');
  }
  async function salvarConfiguracoes() {
    const campos = ['logo_url','banner_url','titulo_hero','subtitulo_hero','texto_retirada','texto_pagamento','texto_fritura','telefone','whatsapp_link','rodape_texto','rodape_copyright','cep_entrega','mensagem_promocional'];
    for(let chave of campos) await supabase.from('configuracoes').upsert({ chave, valor: document.getElementById(`cfg_${chave}`).value }, { onConflict: 'chave' });
    alert('Configurações salvas!');
    carregarTudo();
  }

  function renderizarRegras() {
    const container = document.getElementById('regrasList');
    if(!dados.regras.length) { container.innerHTML = '<p class="text-gray-400">Nenhuma regra</p>'; return; }
    container.innerHTML = dados.regras.map(r => `
      <div class="border p-4 rounded mb-4">
        <label class="font-bold capitalize">${r.tipo_evento}</label>
        <div class="grid grid-cols-2 gap-4 mt-2">
          <div><label>Salgados/pessoa</label><input type="number" id="reg_${r.tipo_evento}_s" value="${r.salgados_por_pessoa}"></div>
          <div><label>Doces/pessoa</label><input type="number" id="reg_${r.tipo_evento}_d" value="${r.doces_por_pessoa}"></div>
        </div>
      </div>
    `).join('');
  }
  async function salvarRegras() {
    for(let r of dados.regras) await supabase.from('regras_calculadora').upsert({ tipo_evento: r.tipo_evento, salgados_por_pessoa: parseInt(document.getElementById(`reg_${r.tipo_evento}_s`).value), doces_por_pessoa: parseInt(document.getElementById(`reg_${r.tipo_evento}_d`).value) }, { onConflict: 'tipo_evento' });
    alert('Regras salvas!'); carregarTudo();
  }

  function renderizarProdutos() {
    const container = document.getElementById('produtosList');
    if(!dados.produtos.length) { container.innerHTML = '<p class="text-gray-400">Nenhum produto</p>'; return; }
    container.innerHTML = dados.produtos.map(p => `<div class="flex justify-between items-center border-b py-3"><div><strong>${p.nome}</strong> - R$ ${p.preco} - ${p.categoria}</div><div><button onclick="editarProduto(${p.id})" class="btn-outline mr-2">Editar</button><button onclick="excluirProduto(${p.id})" class="text-red-600">Excluir</button></div></div>`).join('');
  }
  async function novoProduto() { let nome = prompt('Nome'); if(!nome) return; let preco = parseFloat(prompt('Preço')); if(isNaN(preco)) return; let categoria = prompt('Categoria'); let unidade = prompt('Unidade'); let descricao = prompt('Descrição'); let imagem = prompt('URL da imagem', 'https://via.placeholder.com/300x200'); await supabase.from('cardapio').insert([{ nome, preco, categoria, unidade, descricao, imagem }]); carregarTudo(); }
  async function editarProduto(id) { let p = dados.produtos.find(x=>x.id==id); if(!p) return; let nome = prompt('Nome', p.nome); let preco = parseFloat(prompt('Preço', p.preco)); let categoria = prompt('Categoria', p.categoria); let unidade = prompt('Unidade', p.unidade); let descricao = prompt('Descrição', p.descricao); let imagem = prompt('URL da imagem', p.imagem); await supabase.from('cardapio').update({ nome, preco, categoria, unidade, descricao, imagem }).eq('id', id); carregarTudo(); }
  async function excluirProduto(id) { if(confirm('Excluir?')) { await supabase.from('cardapio').delete().eq('id', id); carregarTudo(); } }

  function renderizarFaq() {
    const container = document.getElementById('faqList');
    if(!dados.faq.length) { container.innerHTML = '<p class="text-gray-400">Nenhuma FAQ</p>'; return; }
    container.innerHTML = dados.faq.map(f => `<div class="flex justify-between items-center border-b py-3"><div><strong>${f.pergunta}</strong><br><span class="text-sm text-gray-500">${f.resposta.substring(0,80)}...</span></div><div><button onclick="editarFaq(${f.id})" class="btn-outline mr-2">Editar</button><button onclick="excluirFaq(${f.id})" class="text-red-600">Excluir</button></div></div>`).join('');
  }
  async function novoFaq() { let pergunta = prompt('Pergunta'); if(!pergunta) return; let resposta = prompt('Resposta'); if(!resposta) return; await supabase.from('faq').insert([{ pergunta, resposta, ordem: dados.faq.length+1 }]); carregarTudo(); }
  async function editarFaq(id) { let f = dados.faq.find(x=>x.id==id); if(!f) return; let pergunta = prompt('Pergunta', f.pergunta); let resposta = prompt('Resposta', f.resposta); await supabase.from('faq').update({ pergunta, resposta }).eq('id', id); carregarTudo(); }
  async function excluirFaq(id) { if(confirm('Excluir?')) { await supabase.from('faq').delete().eq('id', id); carregarTudo(); } }

  function renderizarRespostas() {
    const container = document.getElementById('respostasList');
    if(!dados.respostas.length) { container.innerHTML = '<p class="text-gray-400">Nenhuma resposta</p>'; return; }
    container.innerHTML = dados.respostas.map(r => `<div class="border p-3 rounded mb-3"><label class="font-bold">Palavra-chave: ${r.palavra_chave}</label><textarea id="resp_${r.palavra_chave}" class="w-full mt-1" rows="2">${r.resposta}</textarea></div>`).join('');
  }
  async function salvarRespostas() { for(let r of dados.respostas) await supabase.from('respostas_delinha').upsert({ palavra_chave: r.palavra_chave, resposta: document.getElementById(`resp_${r.palavra_chave}`).value }, { onConflict: 'palavra_chave' }); alert('Respostas salvas!'); carregarTudo(); }

  function renderizarRedes() {
    const plataformas = ['instagram','facebook','tiktok','youtube','twitter','linkedin'];
    const container = document.getElementById('redesList');
    container.innerHTML = plataformas.map(plat => {
      let item = dados.redes.find(r=>r.plataforma===plat);
      return `<div><label class="capitalize">${plat}</label><input type="url" id="rede_${plat}" value="${item?.url || ''}" placeholder="https://${plat}.com/..." class="w-full"></div>`;
    }).join('');
  }
  async function salvarRedes() { for(let plat of ['instagram','facebook','tiktok','youtube','twitter','linkedin']) { let url = document.getElementById(`rede_${plat}`).value; if(url) await supabase.from('redes_sociais').upsert({ plataforma: plat, url, icone: plat, ativo: true }, { onConflict: 'plataforma' }); } alert('Redes salvas!'); carregarTudo(); }

  function renderizarHorario() {
    const dias = ['segunda','terca','quarta','quinta','sexta','sabado','domingo'];
    const labels = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
    const container = document.getElementById('horarioList');
    container.innerHTML = dias.map((dia,idx) => {
      let item = dados.horario.find(h=>h.dia===dia);
      return `<div class="border p-3 rounded"><label class="font-bold">${labels[idx]}</label><div class="grid grid-cols-2 gap-2 mt-1"><div><label class="text-xs">Abertura</label><input type="time" id="abertura_${dia}" value="${item?.abertura || '09:00'}"></div><div><label class="text-xs">Fechamento</label><input type="time" id="fechamento_${dia}" value="${item?.fechamento || '18:00'}"></div></div><label class="flex items-center gap-2 mt-2"><input type="checkbox" id="fechado_${dia}" ${item?.fechado ? 'checked' : ''}> Fechado</label></div>`;
    }).join('');
    dias.forEach(dia => { let cb = document.getElementById(`fechado_${dia}`); if(cb) cb.addEventListener('change', e => { document.getElementById(`abertura_${dia}`).disabled = e.target.checked; document.getElementById(`fechamento_${dia}`).disabled = e.target.checked; }); });
  }
  async function salvarHorario() {
    const dias = ['segunda','terca','quarta','quinta','sexta','sabado','domingo'];
    for(let dia of dias) { let fechado = document.getElementById(`fechado_${dia}`).checked; await supabase.from('horario_funcionamento').upsert({ dia, abertura: fechado ? null : document.getElementById(`abertura_${dia}`).value, fechamento: fechado ? null : document.getElementById(`fechamento_${dia}`).value, fechado }, { onConflict: 'dia' }); }
    alert('Horário salvo!'); carregarTudo();
  }

  function mostrarAba(aba) { const abas = ['config','regras','cardapio','faq','respostas','redes','horario']; for(let a of abas) { document.getElementById(`aba${a.charAt(0).toUpperCase()+a.slice(1)}`).classList.add('hidden'); document.getElementById(`btn${a.charAt(0).toUpperCase()+a.slice(1)}`).classList.add('tab-inactive'); document.getElementById(`btn${a.charAt(0).toUpperCase()+a.slice(1)}`).classList.remove('tab-active'); } document.getElementById(`aba${aba.charAt(0).toUpperCase()+aba.slice(1)}`).classList.remove('hidden'); document.getElementById(`btn${aba.charAt(0).toUpperCase()+aba.slice(1)}`).classList.remove('tab-inactive'); document.getElementById(`btn${aba.charAt(0).toUpperCase()+aba.slice(1)}`).classList.add('tab-active'); }

  carregarTudo();
</script>
</body>
</html>
